# ==================== 数据库核心配置 ====================
spring.datasource.url=jdbc:mysql://localhost:3306/pet_cloud_db?useSSL=false&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:lhccygr518625...}

# ===================== Redis配置 =====================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=10000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ===================== JWT配置 =====================
jwt.secret-key=${JWT_SECRET_KEY:pet-cloud-consultation-secret-key-for-jwt-token-generation-2024}
jwt.expiration-time=604800000
jwt.header=Authorization
jwt.token-prefix=Bearer

# ===================== AI配置 =====================
aliyu.hundred-refinements.api-key=${ALIYUN_BAILIAN_API_KEY:}
ai.prompt.version.default=v1

# ===================== CORS 白名单 =====================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
